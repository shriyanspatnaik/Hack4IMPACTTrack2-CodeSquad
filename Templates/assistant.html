<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant — Kritique Buddy</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Kritique<span>Buddy</span></div>
        <div style="display:flex;gap:12px;align-items:center;">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Theme</button>
            <a href="/" class="btn btn-outline">← Back</a>
        </div>
    </nav>
    <div class="container">
        <h1 style="font-family:'Syne',sans-serif;font-size:1.6rem;margin-bottom:6px;">Patient Intake Form</h1>
        <p style="color:var(--text-muted);margin-bottom:28px;font-size:0.9rem;">Enter patient details to begin AI triage
            analysis</p>

        <div class="card" style="max-width:700px;">
            <div class="grid-2">
                <div class="form-group">
                    <label>Patient Full Name *</label>
                    <input type="text" id="name" placeholder="e.g. Ramesh Kumar">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" placeholder="e.g. 9876543210">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Age *</label>
                    <input type="number" id="age" placeholder="e.g. 45">
                </div>
                <div class="form-group">
                    <label>Gender *</label>
                    <select id="gender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Symptoms (describe in detail) *</label>
                <textarea id="symptoms" rows="4"
                    placeholder="e.g. High fever for 3 days, severe headache, joint pain, rash on arms..."></textarea>
            </div>
            <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:14px;font-weight:600;">📊 Vitals</p>
            <div class="grid-2">
                <div class="form-group">
                    <label>Blood Pressure (mmHg)</label>
                    <input type="text" id="bp" placeholder="e.g. 120/80">
                </div>
                <div class="form-group">
                    <label>Oxygen Level (%)</label>
                    <input type="number" id="oxygen" placeholder="e.g. 98">
                </div>
            </div>
            <div class="form-group">
                <label>Blood Sugar (mg/dL)</label>
                <input type="number" id="sugar" placeholder="e.g. 110">
            </div>

            <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;" onclick="submitPatient()">
                🔍 Analyze & Submit Patient
            </button>
        </div>

        <!-- Result Card -->
        <div id="result" class="card" style="max-width:700px;margin-top:20px;display:none;">
            <p class="modal-title">✅ Patient Submitted Successfully</p>
            <div id="severity-badge" style="margin-bottom:16px;"></div>
            <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:12px;">AI Disease Predictions:</p>
            <div id="disease-list"></div>
            <div id="progression-warning"></div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="resetForm()">+ Add Another
                Patient</button>
        </div>
    </div>

    <script>
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.body.classList.add('light');
        function toggleTheme() {
            document.body.classList.toggle('light');
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        }

        async function submitPatient() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const symptoms = document.getElementById('symptoms').value.trim();
            if (!name || !phone || !age || !gender || !symptoms) {
                alert('Please fill in all required fields!');
                return;
            }
            const btn = document.querySelector('.btn-primary');
            btn.textContent = '⏳ Analyzing with AI...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/add_patient', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name, phone, age: parseInt(age), gender,
                        symptoms,
                        bp: document.getElementById('bp').value || 'Not measured',
                        oxygen: document.getElementById('oxygen').value || 'Not measured',
                        sugar: document.getElementById('sugar').value || 'Not measured'
                    })
                });
                const data = await res.json();
                showResult(data.analysis);
            } catch (e) {
                alert('Error submitting patient. Please try again.');
            }
            btn.textContent = '🔍 Analyze & Submit Patient';
            btn.disabled = false;
        }

        function showResult(analysis) {
            const colors = { Critical: 'critical', Orange: 'orange', Moderate: 'moderate', Mild: 'mild' };
            const cls = colors[analysis.severity] || 'mild';
            document.getElementById('severity-badge').innerHTML =
                `<span class="badge badge-${cls}" style="font-size:1rem;padding:8px 16px;">
          ${analysis.severity === 'Critical' ? '🔴' : analysis.severity === 'Orange' ? '🟠' : analysis.severity === 'Moderate' ? '🟡' : '🟢'}
          ${analysis.severity} Priority
        </span>`;
            let diseasesHtml = '';
            analysis.diseases.forEach(d => {
                diseasesHtml += `
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:0.9rem;margin-bottom:4px;">
              <span>${d.name}</span><span style="color:var(--accent);font-weight:700;">${d.likelihood}%</span>
            </div>
            <div class="disease-bar"><div class="disease-fill" style="width:${d.likelihood}%"></div></div>
          </div>`;
            });
            document.getElementById('disease-list').innerHTML = diseasesHtml;
            if (analysis.progression_warning) {
                document.getElementById('progression-warning').innerHTML =
                    `<div class="progress-warning">⚠️ ${analysis.progression_warning}</div>`;
            }
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            ['name', 'phone', 'age', 'symptoms', 'bp', 'oxygen', 'sugar'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('gender').value = '';
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>

</html>
